body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.header{
  background:#fff;
  padding:8px 12px;
  padding-top:max(8px, env(safe-area-inset-top, 20px));
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
  min-height:48px;
  border-bottom:1px solid #e5e5e5;
}
.header .back{
  color:#333;
  font-size:22px;
  line-height:1;
  padding:4px;
  text-decoration:none;
  flex-shrink:0;
}
.header .avatar{
  width:32px;height:32px;
  border-radius:4px;
  flex-shrink:0;
}
.header .info{flex:1;min-width:0;text-align:center}
.header .name{font-weight:500;font-size:16px;color:#333}
.header .status{font-size:11px;color:#999}
.header .btn{
  background:none;border:none;
  font-size:18px;padding:6px 8px;
  cursor:pointer;border-radius:8px;
  color:#666;
  transition:background 0.15s;
}
.header .btn:active{background:rgba(0,0,0,0.06)}
.chat-container{
  flex:1;
  overflow-y:auto;
  padding:12px 10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  -webkit-overflow-scrolling:touch;
  background-color:#ebebeb;
  background-image: var(--bg-image);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
.msg{max-width:80%;display:flex;align-items:flex-start;gap:6px;position:relative}
.msg.user{
  align-self:flex-end;
  flex-direction:row-reverse;
}
.msg.her{
  align-self:flex-start;
}
.msg .bubble{
  position:relative;
  padding:9px 12px;
  border-radius:6px;
  line-height:1.5;
  font-size:15px;
  word-break:break-word;
}
.msg.user .bubble{
  background:var(--bubble-user);color:var(--bubble-user-text);
}
.msg.user .bubble::after{
  content:'';
  position:absolute;
  right:-4px;top:12px;
  width:0;height:0;
  border-left:5px solid var(--bubble-user);
  border-top:3px solid transparent;
  border-bottom:3px solid transparent;
}
.msg.her .bubble{
  background:var(--bubble-her);color:var(--bubble-her-text);
  box-shadow:0 1px 2px rgba(0,0,0,0.06);
}
.msg.her .bubble::after{
  content:'';
  position:absolute;
  left:-4px;top:12px;
  width:0;height:0;
  border-right:5px solid var(--bubble-her);
  border-top:3px solid transparent;
  border-bottom:3px solid transparent;
}
.msg .avatar-sm{
  width:36px;height:36px;
  border-radius:4px;
  flex-shrink:0;
  overflow:hidden;
}
.msg.her .avatar-sm{
  background-size:cover;
  background-position:center;
}
.msg.user .avatar-sm{display:none}
.msg .time{font-size:10px;margin-top:2px;opacity:0.4;text-align:right}
.msg.her .time{text-align:left}
.time-divider{
  text-align:center;
  padding:12px 0 8px;
}
.time-divider span{
  display:inline-block;
  padding:3px 8px;
  border-radius:3px;
  background:rgba(0,0,0,0.08);
  font-size:11px;
  color:#b0b0b0;
}
.typing-dots{
  display:flex;gap:4px;padding:10px 16px;
}
.typing-dots span{
  width:7px;height:7px;border-radius:4px;
  background:#aaa;animation:blink 1.4s infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,60%,100%{opacity:0.3}30%{opacity:1}}
.input-area{
  background:#f7f7f7;
  padding:8px 10px;
  display:flex;
  gap:8px;
  align-items:center;
  border-top:1px solid #e0e0e0;
  flex-shrink:0;
  padding-bottom:max(8px,env(safe-area-inset-bottom));
}
.input-area .icon-btn{
  width:32px;height:32px;
  border:none;
  background:none;
  font-size:20px;
  cursor:pointer;
  border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  color:#666;
  padding:0;
}
.input-area .icon-btn:active{background:rgba(0,0,0,0.06)}
.input-area textarea{
  flex:1;
  border:1px solid #e0e0e0;
  border-radius:5px;
  padding:7px 10px;
  font-size:15px;
  font-family:var(--font);
  resize:none;
  max-height:100px;
  outline:none;
  background:#fff;
  color:var(--text);
  line-height:1.4;
  min-width:0;
}
.input-area textarea:focus{border-color:var(--accent)}
.input-area .send-btn{
  width:32px;height:32px;
  border:none;
  background:none;
  font-size:18px;
  cursor:pointer;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:#999;
  padding:0;
}
.input-area .send-btn.has-text{color:var(--accent);font-weight:700}
.input-area .send-btn:active{transform:scale(0.92)}
.empty-state{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:20px;
  color:var(--text-secondary);
  gap:8px;
}
.empty-state .icon{font-size:48px;margin-bottom:8px}
.empty-state h2{font-size:18px;color:var(--text);font-weight:600}
.empty-state p{font-size:14px;line-height:1.5}
.settings-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.5);
  z-index:100;
  display:flex;align-items:flex-end;
  justify-content:center;
}
.settings-panel{
  background:var(--surface);
  width:100%;max-width:500px;
  border-radius:20px 20px 0 0;
  padding:20px 16px 30px;
  max-height:80dvh;
  overflow-y:auto;
}
.settings-panel h3{font-size:18px;margin-bottom:16px;font-weight:600}
.settings-panel label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:4px;font-weight:500}
.settings-panel input,.settings-panel textarea{
  width:100%;padding:10px 14px;
  border:1px solid var(--border);border-radius:12px;
  font-size:14px;font-family:var(--font);
  margin-bottom:14px;outline:none;
  background:var(--bg);color:var(--text);
}
.settings-panel input:focus{border-color:var(--accent)}
.settings-panel .btn-row{display:flex;gap:8px}
.settings-panel .btn-primary,.settings-panel .btn-secondary{
  flex:1;padding:12px;border-radius:12px;
  font-size:15px;border:none;cursor:pointer;font-weight:500;
  transition:opacity 0.15s;
}
.settings-panel .btn-primary{background:var(--accent);color:#fff}
.settings-panel .btn-secondary{background:var(--bg);color:var(--text)}
.settings-panel .btn-primary:active,.settings-panel .btn-secondary:active{opacity:0.7}
.hidden{display:none!important}
.conv-list-overlay{
  position:fixed;inset:0;top:0;
  background:var(--bg);
  z-index:50;
  display:flex;flex-direction:column;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.conv-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:var(--surface);
  border-bottom:1px solid #f0f0f0;
  cursor:pointer;
  transition:background 0.1s;
}
.conv-item:active{background:#ececec}
.conv-item .conv-avatar{
  width:48px;height:48px;border-radius:6px;flex-shrink:0;
  background-size:cover;background-position:center;
  background-color:#e0e0e0;
}
.conv-item .conv-info{flex:1;min-width:0}
.conv-item .conv-title{font-size:16px;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item .conv-preview{font-size:13px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item .conv-meta{text-align:right;flex-shrink:0}
.conv-item .conv-time{font-size:11px;color:#b0b0b0;margin-bottom:4px}
.conv-item .conv-count{font-size:11px;background:var(--accent);color:#fff;border-radius:10px;padding:1px 6px;min-width:18px;text-align:center;display:inline-block}
.login-overlay{
  position:fixed;inset:0;
  background:var(--bg);
  z-index:200;
  display:flex;align-items:center;justify-content:center;
}
.login-panel{
  width:100%;max-width:360px;
  padding:40px 24px;
  text-align:center;
}
.login-panel .avatar-lg{
  width:72px;height:72px;
  border-radius:8px;
  margin:0 auto 20px;
  background-size:cover;
  background-position:center;
}
.login-panel h2{font-size:20px;font-weight:600;margin-bottom:8px}
.login-panel .sub{font-size:13px;color:var(--text-secondary);margin-bottom:24px}
.login-panel label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:4px;text-align:left}
.login-panel input{
  width:100%;padding:10px 14px;
  border:1px solid var(--border);border-radius:12px;
  font-size:15px;font-family:var(--font);
  margin-bottom:12px;outline:none;
  background:#fff;color:var(--text);
}
.login-panel input:focus{border-color:var(--accent)}
.login-panel .btn-row{display:flex;gap:8px;margin-top:8px}
.login-panel .btn-primary,.login-panel .btn-secondary{
  flex:1;padding:12px;border-radius:12px;
  font-size:15px;border:none;cursor:pointer;font-weight:500;
}
.login-panel .btn-primary{background:var(--accent);color:#fff}
.login-panel .btn-secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
.login-panel .btn-primary:active,.login-panel .btn-secondary:active{opacity:0.7}
.login-panel .err{color:var(--danger);font-size:12px;margin-top:-4px;margin-bottom:8px;min-height:18px}
.login-panel .toggle-link{font-size:13px;color:var(--accent);cursor:pointer;margin-top:12px;display:inline-block}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <a class="back" href="javascript:void(0)" id="backBtn" aria-label="返回">‹</a>
  <div class="info">
    <div class="name">莉雅</div>
    <div class="status" id="statusText">在线</div>
  </div>
  <button class="btn" id="newChatBtn" title="新对话">＋</button>
  <button class="btn" id="settingsBtn" title="设置">⋯</button>
</div>

<div class="chat-container" id="chatContainer"></div>

<div class="input-area">
  <button class="icon-btn" aria-label="语音">🎤</button>
  <textarea id="userInput" rows="1" placeholder="" autofocus></textarea>
  <button class="icon-btn" aria-label="表情">😊</button>
  <button class="icon-btn" id="sendBtn">⊕</button>
</div>

<div class="login-overlay hidden" id="loginOverlay">
  <div class="login-panel">
    <div class="avatar-lg" id="loginAvatar"></div>
    <h2 id="loginTitle">登录</h2>
    <p class="sub">连接到莉雅的后端服务器</p>
    <label>服务器地址</label>
    <input type="text" id="loginServerUrl" placeholder="http://localhost:3001">
    <label>用户名</label>
    <input type="text" id="loginUsername" placeholder="设置你的用户名">
    <label>密码</label>
    <input type="password" id="loginPassword" placeholder="至少6位">
    <div class="err" id="loginErr"></div>
    <div class="btn-row">
      <button class="btn-secondary" id="loginToggleBtn">注册新账号</button>
      <button class="btn-primary" id="loginSubmitBtn">登录</button>
    </div>
  </div>
</div>

<div class="conv-list-overlay hidden" id="convListOverlay"></div>

<div class="settings-overlay hidden" id="settingsOverlay">
  <div class="settings-panel">
    <h3>设置</h3>
    <label>后端服务器地址</label>
    <input type="text" id="serverUrlInput" placeholder="http://localhost:3001">
    <p style="font-size:12px;color:var(--text-secondary);margin-bottom:14px;">已登录: <span id="settingsUsername">-</span></p>
    <div class="btn-row">
      <button class="btn-secondary" id="settingsLogoutBtn">退出登录</button>
      <button class="btn-secondary" id="settingsCloseBtn">取消</button>
      <button class="btn-primary" id="settingsSaveBtn">保存</button>
    </div>
  </div>
</div>

// ─── State ───
const STATE_KEY = 'artoria_chat_state';
let state = loadState();
let isStreaming = false;
let streamAbortController = null;

function defaultState() {
  return {
    serverUrl: 'http://124.222.148.238:3001',
    token: '',
    username: '',
    conversations: [],
    activeId: null
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      return { ...defaultState(), ...s };
    }
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

function getActiveConv() {
  if (!state.activeId) return null;
  return state.conversations.find(c => c.id === state.activeId) || null;
}

function createConv() {
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  const conv = { id, title: '新的对话', messages: [], createdAt: Date.now(), updatedAt: Date.now() };
  state.conversations.unshift(conv);
  state.activeId = id;
  saveState();
  return conv;
}

// ─── Server Sessions ───
async function fetchSessions() {
  if (!state.token || !state.serverUrl) return [];
  try {
    const resp = await fetch(`${state.serverUrl.replace(/\/$/, '')}/api/sessions`, {
      headers: authHeaders()
    });
    if (!resp.ok) throw new Error('Failed');
    const data = await resp.json();
    return (data.sessions || []).map(s => ({
      id: s.id,
      title: s.title || '新的对话',
      msgCount: s.msg_count || 0,
      updatedAt: new Date(s.updated_at).getTime(),
      messages: []
    }));
  } catch (e) {
    return [];
  }
}

function renderConvList(sessions) {
  convListOverlay.innerHTML = '';
  if (sessions.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<p>还没有对话</p><p style="font-size:13px;color:#999;">点击右上角 ＋ 开始</p>';
    convListOverlay.appendChild(empty);
  }
  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = 'conv-item';
    item.innerHTML = `
      <div class="conv-avatar" style="background-image:url(${AVATAR_LLYA})"></div>
      <div class="conv-info">
        <div class="conv-title">${escapeHtml(s.title)}</div>
        <div class="conv-preview">${s.msgCount} 条消息</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${formatTime(s.updatedAt)}</div>
      </div>`;
    item.addEventListener('click', () => openConv(s.id));
    convListOverlay.appendChild(item);
  });
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (d.toDateString() === now.toDateString()) {
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }
  return (d.getMonth()+1) + '/' + d.getDate();
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

async function openConv(sessionId) {
  if (!state.token || !state.serverUrl) return;
  try {
    const resp = await fetch(`${state.serverUrl.replace(/\/$/, '')}/api/sessions/${sessionId}`, {
      headers: authHeaders()
    });
    if (!resp.ok) throw new Error('Failed');
    const session = await resp.json();
    const messages = (session.messages || []).map(m => ({
      role: m.role,
      content: m.content,
      timestamp: new Date(m.created_at).getTime()
    }));
    // Update local state
    let conv = state.conversations.find(c => c.id === sessionId);
    if (!conv) {
      conv = {
        id: sessionId,
        title: session.title || '新的对话',
        messages,
        createdAt: new Date(session.created_at).getTime(),
        updatedAt: new Date(session.updated_at).getTime()
      };
      state.conversations.unshift(conv);
    } else {
      conv.messages = messages;
    }
    state.activeId = sessionId;
    saveState();
    convListOverlay.classList.add('hidden');
    renderMessages(messages);
    if (emptyState) emptyState.classList.add('hidden');
  } catch (e) {
    // fallback: use local conv if exists
    const conv = state.conversations.find(c => c.id === sessionId);
    if (conv) {
      state.activeId = sessionId;
      saveState();
      convListOverlay.classList.add('hidden');
      renderMessages(conv.messages);
      if (emptyState) emptyState.classList.add('hidden');
    }
  }
}

async function showConvList() {
  const sessions = await fetchSessions();
  // Merge with any local-only conversations
  const serverIds = new Set(sessions.map(s => s.id));
  const localOnly = state.conversations.filter(c => !serverIds.has(c.id) && c.messages.length > 0);
  const all = [...sessions, ...localOnly].sort((a, b) => b.updatedAt - a.updatedAt);
  renderConvList(all);
  convListOverlay.classList.remove('hidden');
  chatContainer.querySelectorAll('.msg,.typing,.time-divider').forEach(e => e.remove());
  if (emptyState) emptyState.classList.add('hidden');
}

function renderMessages(messages) {
  chatContainer.querySelectorAll('.msg,.typing,.time-divider').forEach(e => e.remove());
  if (emptyState) emptyState.classList.add('hidden');

  if (messages.length === 0) {
    if (emptyState) emptyState.classList.remove('hidden');
    return;
  }

  messages.forEach((m, i) => {
    const prev = i > 0 ? messages[i - 1] : null;
    const gap = prev ? (m.timestamp || Date.now()) - (prev.timestamp || Date.now()) : 0;
    if (gap > 300000 && prev) {
      const div = document.createElement('div');
      div.className = 'time-divider';
      const span = document.createElement('span');
      span.textContent = formatTimeFull(m.timestamp || Date.now());
      div.appendChild(span);
      chatContainer.appendChild(div);
    }

    const isUser = m.role === 'user';
    const wrapper = document.createElement('div');
    wrapper.className = 'msg ' + (isUser ? 'user' : 'her');

    const avatar = document.createElement('div');
    avatar.className = 'avatar-sm';
    if (!isUser) {
      avatar.style.backgroundImage = 'url(' + AVATAR_LLYA + ')';
      avatar.style.backgroundSize = 'cover';
      avatar.style.backgroundPosition = 'center';
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = escapeHtml(m.content).replace(/\n/g, '<br>');

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chatContainer.appendChild(wrapper);
  });
  scrollBottom();
}

const WEEKDAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
function formatTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function formatTimeFull(ts) {
  const d = new Date(ts);
  const now = new Date();
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  const time = h + ':' + m;
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffDays = Math.floor((today - target) / 86400000);
  if (diffDays === 0) return time;
  if (diffDays === 1) return '昨天 ' + time;
  if (diffDays < 7) return WEEKDAYS[d.getDay()] + ' ' + time;
  return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日 ' + time;
}

function escapeHtml(text) {
  const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
  return text.replace(/[&<>"']/g, c => map[c]);
}

function scrollBottom() {
  requestAnimationFrame(() => {
    chatContainer.scrollTop = chatContainer.scrollHeight;
  });
}

function showTyping() {
  const nameEl = document.querySelector('.header .name');
  if (nameEl) nameEl.textContent = '对方正在输入中...';
}

function hideTyping() {
  const nameEl = document.querySelector('.header .name');
  if (nameEl) nameEl.textContent = '莉雅';
}

function addMessage(role, content) {
  const conv = getActiveConv();
  if (!conv) return;
  conv.messages.push({ role, content, timestamp: Date.now() });
  conv.updatedAt = Date.now();
  // Auto-title from first user message
  if (conv.title === '新的对话' && role === 'user') {
    conv.title = content.slice(0, 30) + (content.length > 30 ? '…' : '');
  }
  saveState();
}

// ─── API Call ───
async function fetchWithRetry(url, options, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    try {
      const resp = await fetch(url, options);
      if (resp.status < 500) return resp; // 4xx errors are not retryable
      if (i < retries) {
        await new Promise(r => setTimeout(r, 1000 * (i + 1)));
        continue;
      }
      return resp;
    } catch (e) {
      if (i < retries && (e.name === 'TypeError' || e.message.includes('network') || e.message.includes('fetch'))) {
        await new Promise(r => setTimeout(r, 1000 * (i + 1)));
        continue;
      }
      throw e;
    }
  }
}

function authHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${state.token}`
  };
}

async function callBackendAPI(messages) {
  if (!state.token) throw new Error('请先登录');
  if (!state.serverUrl) throw new Error('请设置服务器地址');

  const systemPrompt = buildSystemPrompt();
  const apiMessages = messages.map(m => ({ role: m.role, content: m.content }));
  const conv = getActiveConv();

  const resp = await fetchWithRetry(`${state.serverUrl.replace(/\/$/, '')}/api/chat`, {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({
      sessionId: conv?.id || null,
      message: messages[messages.length - 1]?.content || '',
      system: buildSystemPrompt()
    })
  });

  if (!resp.ok) {
    if (resp.status === 401) {
      state.token = '';
      saveState();
      throw new Error('登录已过期，请重新登录');
    }
    const errData = await resp.json().catch(() => ({}));
    throw new Error(errData.error?.message || `服务器错误 (${resp.status})`);
  }

  const data = await resp.json();
  let text = '';
  if (data.content) {
    const textBlock = data.content.find(c => c.type === 'text');
    if (textBlock && textBlock.text) text = textBlock.text;
  }
  if (!text && data.choices && data.choices[0]?.message?.content) {
    text = data.choices[0].message.content;
  }
  if (!text) throw new Error('无法解析 API 响应');
  return { text, sessionId: data.sessionId };
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isStreaming) return;

  if (!state.token) {
    showLogin();
    return;
  }

  let conv = getActiveConv();
  if (!conv) conv = createConv();

  if (emptyState) emptyState.classList.add('hidden');

  // Add user message
  addMessage('user', text);
  renderMessages(conv.messages);
  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.textContent = '⊕';
  sendBtn.style.color = '#999';
  sendBtn.style.fontWeight = '400';

  // Build API messages (last 30 to save context)
  const apiMessages = conv.messages.slice(-30);

  // Show typing
  showTyping();

  try {
    const result = await callBackendAPI(apiMessages);
    let reply = result.text.replace(/——/g, '');
    hideTyping();
    // Sync server session ID if this was a new conversation
    conv = getActiveConv();
    if (result.sessionId && conv && conv.id !== result.sessionId) {
      const oldId = conv.id;
      conv.id = result.sessionId;
      state.activeId = result.sessionId;
      // Update conversations array
      const idx = state.conversations.findIndex(c => c.id === oldId);
      if (idx >= 0) state.conversations[idx] = conv;
      saveState();
    }
    addMessage('assistant', reply);
    conv = getActiveConv();
    renderMessages(conv.messages);
  } catch(e) {
    hideTyping();
    // Show error as a message
    const errConv = getActiveConv();
    if (errConv) {
      errConv.messages.push({ role: 'assistant', content: '出了点问题。' + e.message, timestamp: Date.now() });
      renderMessages(errConv.messages);
    }
  }
}

// ─── Event Listeners ───
sendBtn.addEventListener('click', sendMessage);

userInput.addEventListener('input', () => {
  const hasText = userInput.value.trim().length > 0 && !isStreaming;
  if (hasText) {
    sendBtn.textContent = '↑';
    sendBtn.style.color = '#07c160';
    sendBtn.style.fontWeight = '700';
  } else {
    sendBtn.textContent = '⊕';
    sendBtn.style.color = '#999';
    sendBtn.style.fontWeight = '400';
  }
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
});

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById('backBtn').addEventListener('click', goToConvList);
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('settingsCloseBtn').addEventListener('click', closeSettings);
document.getElementById('settingsSaveBtn').addEventListener('click', saveSettings);
document.getElementById('settingsLogoutBtn').addEventListener('click', logout);
document.getElementById('newChatBtn').addEventListener('click', newChat);
settingsOverlay.addEventListener('click', (e) => {
  if (e.target === settingsOverlay) closeSettings();
});
// Login
loginSubmitBtn.addEventListener('click', handleLogin);
loginToggleBtn.addEventListener('click', toggleLoginMode);
loginOverlay.addEventListener('click', (e) => {
  if (e.target === loginOverlay) loginOverlay.classList.add('hidden');
});

// ─── Settings ───
function openSettings() {
  serverUrlInput.value = state.serverUrl || 'http://localhost:3001';
  if (settingsUsername) settingsUsername.textContent = state.username || '未登录';
  settingsOverlay.classList.remove('hidden');
}

function closeSettings() {
  settingsOverlay.classList.add('hidden');
}

function saveSettings() {
  state.serverUrl = serverUrlInput.value.trim() || 'http://localhost:3001';
  saveState();
  closeSettings();
}

function logout() {
  state.token = '';
  state.username = '';
  state.conversations = [];
  state.activeId = null;
  saveState();
  closeSettings();
  renderMessages([]);
  if (emptyState) emptyState.classList.remove('hidden');
  showLogin();
}

// ─── Login ───
function showLogin() {
  if (loginAvatar) loginAvatar.style.backgroundImage = 'url(' + AVATAR_LLYA + ')';
  loginServerUrl.value = state.serverUrl || 'http://localhost:3001';
  loginErr.textContent = '';
  loginUsername.value = '';
  loginPassword.value = '';
  setLoginMode('login');
  loginOverlay.classList.remove('hidden');
}

function setLoginMode(mode) {
  loginMode = mode;
  if (mode === 'login') {
    loginTitle.textContent = '登录';
    loginSubmitBtn.textContent = '登录';
    loginToggleBtn.textContent = '注册新账号';
  } else {
    loginTitle.textContent = '注册';
    loginSubmitBtn.textContent = '注册';
    loginToggleBtn.textContent = '已有账号，去登录';
  }
}

function toggleLoginMode() {
  setLoginMode(loginMode === 'login' ? 'register' : 'login');
}

async function handleLogin() {
  const serverUrl = loginServerUrl.value.trim() || 'http://localhost:3001';
  const username = loginUsername.value.trim();
  const password = loginPassword.value;

  if (!username || !password || password.length < 6) {
    loginErr.textContent = '用户名不能为空，密码至少6位';
    return;
  }

  loginErr.textContent = '';
  loginSubmitBtn.disabled = true;
  loginSubmitBtn.textContent = '...';

  try {
    const endpoint = loginMode === 'login' ? '/api/auth/login' : '/api/auth/register';
    const resp = await fetch(`${serverUrl.replace(/\/$/, '')}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || `请求失败 (${resp.status})`);

    state.serverUrl = serverUrl;
    state.token = data.token;
    state.username = data.username || username;
    saveState();
    loginOverlay.classList.add('hidden');
    statusText.textContent = '在线';
    if (settingsUsername) settingsUsername.textContent = state.username;
    showConvList();
  } catch (e) {
    loginErr.textContent = e.message;
  } finally {
    loginSubmitBtn.disabled = false;
    setLoginMode(loginMode);
  }
}

async function newChat() {
  const conv = getActiveConv();
  if (conv && conv.messages.length === 0) return;
  // Try to create on server first
  if (state.token && state.serverUrl) {
    try {
      const resp = await fetch(`${state.serverUrl.replace(/\/$/, '')}/api/sessions`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ title: '新的对话' })
      });
      if (resp.ok) {
        const s = await resp.json();
        const conv = { id: s.id, title: s.title, messages: [], createdAt: Date.now(), updatedAt: Date.now() };
        state.conversations.unshift(conv);
        state.activeId = s.id;
        saveState();
        convListOverlay.classList.add('hidden');
        renderMessages([]);
        if (emptyState) emptyState.classList.remove('hidden');
        userInput.focus();
        return;
      }
    } catch (e) {}
  }
  // Fallback to local
  createConv();
  renderMessages([]);
  if (emptyState) emptyState.classList.remove('hidden');
  userInput.focus();
}

function goToConvList() {
  showConvList();
}

// ─── Init ───
function init() {
  const ha = document.getElementById('headerAvatar');
  if (ha) { ha.style.backgroundImage = 'url(' + AVATAR_LLYA + ')'; ha.style.backgroundSize = 'cover'; ha.style.backgroundPosition = 'center'; }

  const conv = getActiveConv();
  if (conv && conv.messages.length > 0) {
    renderMessages(conv.messages);
  }

  if (settingsUsername) settingsUsername.textContent = state.username || '未登录';

  if (!state.token) {
    showLogin();
    statusText.textContent = '未登录';
  } else {
    statusText.textContent = '在线';
    showConvList();
  }

  userInput.focus();
}

// ─── PWA ───
if ('serviceWorker' in navigator) {
  // Register a minimal SW for offline caching
  if (!navigator.serviceWorker.controller) {
    const swCode = `
      const CACHE = 'artoria-v2';
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => e.waitUntil(clients.claim()));
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request))
        );
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob))
      .catch(() => {}); // Silently fail if not supported
  }
}

init();
</script>
